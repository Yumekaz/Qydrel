name: ci

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format
        run: cargo fmt --all -- --check

  linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Lint
        shell: bash
        run: |
          set +e
          cargo clippy --locked --all-targets --all-features -- -D warnings 2>&1 | tee cargo-clippy.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            python3 - <<'PY'
          from pathlib import Path
          text = "\n".join(Path("cargo-clippy.log").read_text(errors="replace").splitlines()[-120:])
          text = text.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
          print(f"::error title=Linux cargo clippy failed::{text}")
          PY
            exit "$status"
          fi

      - name: Test
        shell: bash
        run: |
          set +e
          cargo test --locked --all-targets --all-features 2>&1 | tee cargo-test.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            python3 - <<'PY'
          from pathlib import Path
          text = "\n".join(Path("cargo-test.log").read_text(errors="replace").splitlines()[-120:])
          text = text.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")
          print(f"::error title=Linux cargo test failed::{text}")
          PY
            exit "$status"
          fi

      - name: Release Build
        run: cargo build --locked --release

      - name: Build Benchmarks
        run: cargo bench --no-run --locked

      - name: Smoke Test
        run: cargo run --locked --release -- examples/hello.lang

      - name: AST Oracle Smoke
        run: cargo run --locked --release -- examples/hello.lang --oracle

      - name: Evidence Report Smoke
        run: cargo run --locked --release -- --evidence-report evidence/ci --evidence-fuzz 1

      - name: Upload Evidence Report
        uses: actions/upload-artifact@v4
        with:
          name: evidence-report-${{ github.run_id }}
          path: evidence/ci
          if-no-files-found: error
          retention-days: 14

  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: MSVC Developer Shell
        uses: ilammy/msvc-dev-cmd@v1

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Test
        run: |
          cargo test --locked *> cargo-test.log
          $status = $LASTEXITCODE
          if ($status -ne 0) {
            $text = (Get-Content cargo-test.log -Tail 120) -join "`n"
            $text = $text.Replace("%", "%25").Replace("`r", "%0D").Replace("`n", "%0A")
            Write-Output "::error title=Windows cargo test failed::$text"
            exit $status
          }

  fuzz:
    runs-on: ubuntu-latest
    needs: linux
    strategy:
      fail-fast: false
      matrix:
        seed: ["0x5eed", "0xc0ffee", "0xbadc0de", "0x51ced"]
        mode: ["general", "optimizer-stress"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Release Build
        run: cargo build --locked --release

      - name: Push Fuzz Audit
        id: fuzz_audit_push
        if: github.event_name != 'schedule'
        run: |
          cargo run --locked --release -- --fuzz 150 --fuzz-seed ${{ matrix.seed }} --fuzz-mode ${{ matrix.mode }} --fuzz-artifacts fuzz-artifacts/${{ matrix.mode }}-${{ matrix.seed }} --fuzz-json fuzz-summary-${{ matrix.mode }}-${{ matrix.seed }}.json

      - name: Nightly Fuzz Audit
        id: fuzz_audit_nightly
        if: github.event_name == 'schedule'
        run: |
          cargo run --locked --release -- --fuzz 1000 --fuzz-seed ${{ matrix.seed }} --fuzz-mode ${{ matrix.mode }} --fuzz-artifacts fuzz-artifacts/${{ matrix.mode }}-${{ matrix.seed }} --fuzz-json fuzz-summary-${{ matrix.mode }}-${{ matrix.seed }}.json

      - name: Upload Fuzz Summaries
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-summary-${{ matrix.mode }}-${{ matrix.seed }}-${{ github.run_id }}
          path: fuzz-summary-*.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Fuzz Artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-artifacts-${{ matrix.mode }}-${{ matrix.seed }}-${{ github.run_id }}
          path: fuzz-artifacts
          if-no-files-found: ignore
          retention-days: 14
